services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: refund_db
      POSTGRES_USER: refund_user
      POSTGRES_PASSWORD: refund_pass
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refund_user -d refund_db"]
      interval: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  batch:
    build:
      context: .
      dockerfile: batch_process/Dockerfile
    environment:
      API_URL: http://api:8000/predict
      DB_HOST: db
      DB_NAME: refund_db
      DB_USER: refund_user
      DB_PASSWORD: refund_pass
    volumes:
      - ./batch_process/upload:/app/upload
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
